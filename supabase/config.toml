project_id = "isbitir-development"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "isbitir://auth/callback"
additional_redirect_urls = ["exp://127.0.0.1:8082/--/auth/callback", "exp://**", "isbitir://auth/callback", "isbitir://**"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[auth.email.template.confirmation]
subject = "İşBitir e-posta adresinizi doğrulayın"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "İşBitir şifrenizi yenileyin"
content_path = "./supabase/templates/recovery.html"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage]
enabled = true
file_size_limit = "10MiB"
